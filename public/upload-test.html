<!DOCTYPE html>
<html>
<head>
    <title>Upload Test</title>
</head>
<body>
    <h1>Upload Test</h1>
    <input type="file" id="fileInput" accept="image/*">
    <button onclick="uploadFile()">Upload to /api/upload-test</button>
    <button onclick="uploadFileAuth()">Upload to /api/upload (with auth)</button>
    <div id="result"></div>

    <script>
        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            
            if (!file) {
                alert('Please select a file first');
                return;
            }

            const formData = new FormData();
            formData.append('image', file);

            console.log('Testing upload to /api/upload-test (no auth)');
            
            try {
                const response = await fetch('/api/upload-test', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                console.log('Response:', result);
                document.getElementById('result').innerHTML = `
                    <h3>Upload Test Result:</h3>
                    <pre>${JSON.stringify(result, null, 2)}</pre>
                    <p>Status: ${response.status}</p>
                `;
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('result').innerHTML = `<p>Error: ${error.message}</p>`;
            }
        }

        async function uploadFileAuth() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            
            if (!file) {
                alert('Please select a file first');
                return;
            }

            const formData = new FormData();
            formData.append('image', file);

            // Get admin token from localStorage (you need to be logged in as admin)
            const adminToken = localStorage.getItem('aquatai_admin_token');
            
            if (!adminToken) {
                alert('You need to be logged in as admin first. Go to /admin and login.');
                return;
            }

            console.log('Testing upload to /api/upload (with auth)');
            
            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${adminToken}`
                    },
                    body: formData
                });
                
                const result = await response.json();
                console.log('Response:', result);
                document.getElementById('result').innerHTML = `
                    <h3>Auth Upload Result:</h3>
                    <pre>${JSON.stringify(result, null, 2)}</pre>
                    <p>Status: ${response.status}</p>
                `;
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('result').innerHTML = `<p>Error: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
