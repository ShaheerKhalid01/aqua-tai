[build]
  command = "npm run build"
  publish = ".next"

[functions]
  node_version = "18"

[build.environment]
  NODE_VERSION = "18"
  NPM_VERSION = "9"

# Redirects for API routes
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Handle client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
